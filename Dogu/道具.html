
<!DOCTYPE html>
<html lang="ja">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>音声教材UI</title>

  <style>
    body {
      font-family: sans-serif;
      margin: 0;
      padding: 12px;
      background: url('107.png') no-repeat center center fixed;
      background-size: cover;
    }

    #categories,
    #subcategories {
      display: flex;
      flex-wrap: wrap;
      gap: 8px;
      margin-bottom: 10px;
    }

    button {
      padding: 6px 12px;
      border: none;
      border-radius: 20px;
      background: #ddd;
      cursor: pointer;
      white-space: nowrap;
      font-size: 14px;
    }

    button.active {
      color: #fff;
    }

    button[data-cat="工具"].active {
      background: #ff9800;
    }

    button[data-cat="電動工具"].active {
      background: #f44336;
    }

    button[data-cat="衣類"].active {
      background: #2196f3;
    }

    button[data-cat="設備"].active {
      background: #9c27b0;
    }

    button[data-cat="鋼材"].active {
      background: #607d8b;
    }

    button[data-cat="すべて"].active {
      background: #4caf50;
    }

    .grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(110px, 1fr));
      gap: 10px;
    }

    .item {
      position: relative;
    }

    .item img {
      width: 100%;
      height: 100px;
      object-fit: cover;
      border-radius: 10px;
      cursor: pointer;
      border: 2px solid transparent;
      transition: 0.2s;
      filter: brightness(65%);
    }

    .item img.active {
      border: 2px solid #4caf50;
      transform: scale(1.05);
      filter: brightness(100%);
    }

    .label {
      position: absolute;
      bottom: 6px;
      left: 6px;
      right: 6px;
      color: #fff;
      font-size: 13px;
      font-weight: bold;
      text-shadow: 0 2px 6px rgba(0, 0, 0, 0.8);
    }

    .playing-badge {
      position: absolute;
      top: 6px;
      right: 6px;
      background: #4caf50;
      color: #fff;
      font-size: 11px;
      padding: 2px 6px;
      border-radius: 6px;
      display: none;
    }

    .item.playing .playing-badge {
      display: block;
    }

    .item.playing img {
      animation: pulse 1s infinite;
    }

    @keyframes pulse {
      0% {
        transform: scale(1);
      }

      50% {
        transform: scale(1.06);
      }

      100% {
        transform: scale(1);
      }
    }

    /* 🔽 追加：オーバーレイ（完成版） */
    #overlay {
      position: fixed;
      inset: 0;

      background: rgba(0, 0, 0, 0.55);
      backdrop-filter: blur(6px);

      display: none;

      overflow-y: auto;
      padding: 40px 16px;
      box-sizing: border-box;

      z-index: 999;

      animation: fadeIn 0.25s ease;
    }

    #overlayText {
      margin: 0 auto;
      max-width: 720px;

      color: #fff;
      font-size: clamp(15px, 3.8vw, 20px);
      font-weight: 500;
      text-align: left;
      line-height: 1.8;

      padding: 20px;

      background: rgba(0, 0, 0, 0.6);
      border-radius: 16px;

      box-shadow: 0 10px 30px rgba(0, 0, 0, 0.4);

      white-space: pre-line;

      /* 🔥 これが重要 */
      max-height: calc(100vh - 80px);
      overflow-y: auto;
    }

    /* アニメーション */
    @keyframes fadeIn {
      from {
        opacity: 0;
      }

      to {
        opacity: 1;
      }
    }

    @keyframes slideUp {
      from {
        transform: translateY(20px);
        opacity: 0;
      }

      to {
        transform: translateY(0);
        opacity: 1;
      }
    }
  </style>
</head>

<body>

  <div id="categories"></div>
  <div id="subcategories"></div>
  <div class="grid" id="grid"></div>

  <!-- 🔽 オーバーレイ -->
  <div id="overlay">
    <div id="overlayText"></div>
  </div>

  <script>
    const items = [

      { img: "シノ付片口めがねレンチ.avif", sound: "シノ付片口めがねレンチ.wav", name: "シノ付 片口 めがね レンチ", desc: "ボルトやナットを締めたり外したりする工具", category: "工具", sub: "手工具" },

      { img: "ソケットレンチ.webp", sound: "ソケットレンチ.wav", name: "ソケット レンチ", desc: "ボルトやナットを締めたり外したりする工具", category: "工具", sub: "手工具" },

      { img: "両口メガネレンチ.webp", sound: "両口メガネレンチ.wav", name: "両口 メガネ レンチ", desc: "ボルトやナットを締めたり外したりする工具", category: "工具", sub: "手工具" },

      { img: "⽚⼝スパナ.avif", sound: "⽚⼝スパナ.wav", name: "⽚⼝ スパナ", desc: "ボルトやナットを締めたり外したりする工具", category: "工具", sub: "手工具" },

      { img: "片口めがねレンチ.avif", sound: "片口めがねレンチ.wav", name: "片口 めがね レンチ", desc: "ボルトやナットを締めたり外したりする工具", category: "工具", sub: "手工具" },
      { img: "しの付きラチェットレンチ.avif", sound: "しの付きラチェットレンチ.wav", name: "シノ付き ラチェット レンチ", desc: "ボルトやナットを締めたり外したりする工具", category: "工具", sub: "手工具" },
      {
        img: "打撃メガネレンチ.avif", sound: "打撃メガネレンチ.wav", name: "打撃 メガネ レンチ", desc: `Đa-gê-ki ren-chi（ダゲキレンチ）

Cờ lê vòng đóng (loại dùng để gõ) là dụng cụ có đầu dạng vòng, được thiết kế để sử dụng cùng búa.
Dụng cụ này dùng để siết chặt hoặc tháo các đai ốc, bu lông bị kẹt mà cờ lê thông thường không thể xoay được.

Trước khi sử dụng, cần kiểm tra kích thước của đối tượng và chọn cờ lê phù hợp.
Đặt phần đầu vòng của cờ lê vào đai ốc hoặc bu lông sao cho ăn khớp chắc chắn.
Sau đó, dùng búa gõ vào phần đuôi của cờ lê để tạo lực tác động và làm quay.

Khi gõ, cần giữ chắc cờ lê để tránh bị tuột, và lực gõ phải theo phương thẳng.
Ngoài ra, cần tránh gõ quá mạnh hoặc gõ lệch hướng, vì có thể gây hư hỏng dụng cụ hoặc chi tiết làm việc.`, category: "工具", sub: "手工具"
      },
      { img: "コンビネーションレンチ.webp", sound: "コンビネーションレンチ.wav", name: "コンビネーション レンチ", desc: "ボルトやナットを締めたり外したりする工具", category: "工具", sub: "手工具" },
      { img: "モンキーレンチ.avif", sound: "モンキーレンチ.wav", name: "モンキー レンチ", desc: "ボルトやナットを締めたり外したりする工具", category: "工具", sub: "手工具" },
      { img: "板ラチェットメガネレンチ.avif", sound: "板ラチェットメガネレンチ.wav", name: "板ラチェット メガネ レンチ", desc: "ボルトやナットを締めたり外したりする工具", category: "工具", sub: "手工具" },


      { img: "scale.webp", sound: "scale.mp3", name: "スケール", category: "工具", sub: "測定工具" },
      { img: "caliper.webp", sound: "caliper.mp3", name: "ノギス", category: "工具", sub: "測定工具" },


      { img: "impact.webp", sound: "impact.mp3", name: "インパクト", category: "電動工具" },
      { img: "drill.webp", sound: "drill.mp3", name: "ドリル", category: "電動工具" },


      { img: "gloves.webp", sound: "gloves.mp3", name: "手袋", category: "衣類" },
      { img: "raincoat.webp", sound: "raincoat.mp3", name: "雨かっぱ", category: "衣類" },


      { img: "ladder.webp", sound: "ladder.mp3", name: "脚立", category: "設備" },


      { img: "angle.webp", sound: "angle.mp3", name: "アングル", category: "鋼材" },
      { img: "hbeam.webp", sound: "hbeam.mp3", name: "H形鋼", category: "鋼材" }

    ];

    let currentAudio = null;
    let currentImg = null;

    let currentCategory = "すべて";
    let currentSub = "すべて";

    const grid = document.getElementById("grid");
    const categoriesDiv = document.getElementById("categories");
    const subDiv = document.getElementById("subcategories");

    const categories = [...new Set(items.map(i => i.category))];
    categories.unshift("すべて");

    categories.forEach(cat => {
      const btn = document.createElement("button");
      btn.textContent = cat;
      btn.dataset.cat = cat;

      btn.onclick = () => {
        currentCategory = cat;
        currentSub = "すべて";
        setActive(categoriesDiv, btn);
        renderSub();
        render();
      };

      categoriesDiv.appendChild(btn);
    });

    categoriesDiv.querySelector("button").classList.add("active");

    function renderSub() {
      subDiv.innerHTML = "";
    }

    function render() {
      grid.innerHTML = "";

      let filtered = items.filter(i => {
        return (currentCategory === "すべて" || i.category === currentCategory);
      });

      filtered.forEach(item => {

        const div = document.createElement("div");
        div.className = "item";

        const img = document.createElement("img");
        img.src = item.img;

        const label = document.createElement("div");
        label.className = "label";
        label.textContent = item.name;

        const badge = document.createElement("div");
        badge.className = "playing-badge";
        badge.textContent = "再生中";

        const audio = document.createElement("audio");
        const source = document.createElement("source");
        source.src = item.sound;
        source.type = item.sound.endsWith(".wav") ? "audio/wav" : "audio/mpeg";
        audio.appendChild(source);

        img.onclick = () => playSound(audio, img, item);

        div.append(img, label, badge, audio);
        grid.appendChild(div);
      });
    }

    function playSound(audio, img, item) {
      stopAudio();

      audio.play();
      currentAudio = audio;
      currentImg = img;

      document.querySelectorAll(".item").forEach(i => i.classList.remove("playing"));
      document.querySelectorAll("img").forEach(i => i.classList.remove("active"));

      img.classList.add("active");
      img.parentElement.classList.add("playing");

      const overlay = document.getElementById("overlay");
      const overlayText = document.getElementById("overlayText");

      overlayText.textContent = item.desc || item.name;
      overlay.style.display = "flex";

      audio.onended = () => {
        img.classList.remove("active");
        img.parentElement.classList.remove("playing");
      };
    }

    function stopAudio() {
      if (currentAudio) {
        currentAudio.pause();
        currentAudio.currentTime = 0;
      }
      if (currentImg) {
        currentImg.classList.remove("active");
        currentImg.parentElement.classList.remove("playing");
      }
    }

    document.getElementById("overlay").onclick = () => {
      stopAudio();
      document.getElementById("overlay").style.display = "none";
    };

    function setActive(parent, btn) {
      parent.querySelectorAll("button").forEach(b => b.classList.remove("active"));
      btn.classList.add("active");
    }

    renderSub();
    render();

  </script>

</body>

</html>
