  { img: "メガネレンチ.jpg", sound: "wrench.mp3", name: "メガネレンチ" },
  { img: "drill.webp", sound: "drill.mp3", name: "ドリル" },
  { img: "saw.webp", sound: "saw.mp3", name: "ノコギリ" },
  { img: "helmet.webp", sound: "helmet.mp3", name: "ヘルメット" },
  { img: "gloves.webp", sound: "gloves.mp3", name: "手袋" },
  { img: "ladder.webp", sound: "ladder.mp3", name: "脚立" },
  { img: "pipe.webp", sound: "pipe.mp3", name: "配管" },
  { img: "valve.webp", sound: "valve.mp3", name: "バルブ" },
  { img: "tank.webp", sound: "tank.mp3", name: "タンク" }
];
/* ========================= */

let currentAudio = null;
let currentImg = null;
let pressTimer;
let isLongPress = false;
let autoPlay = false;

const grid = document.getElementById("grid");

/* 自動生成 */
items.forEach((item, index) => {

  const div = document.createElement("div");
  div.className = "item";

  /* 画像 */
  const img = document.createElement("img");
  img.src = item.img;

  /* ラベル（中央文字） */
  const label = document.createElement("div");
  label.className = "label";
  label.textContent = item.name;

  /* 再生中バッジ */
  const badge = document.createElement("div");
  badge.className = "playing-badge";
  badge.textContent = "再生中";

  /* 音声（wav / mp3対応） */
  const audio = document.createElement("audio");
  audio.id = "audio" + index;

  const source = document.createElement("source");
  source.src = item.sound;

  if (item.sound.endsWith(".wav")) {
    source.type = "audio/wav";
  } else if (item.sound.endsWith(".mp3")) {
    source.type = "audio/mpeg";
  }

  audio.appendChild(source);

  /* タッチ操作 */
  img.ontouchstart = (e) => startPress(e, index, img);
  img.ontouchend = (e) => endPress(e, index, img);

  /* PCクリック対応（ついでに） */
  img.onclick = () => playSound(index, img);

  /* DOM追加 */
  div.appendChild(img);
  div.appendChild(label);
  div.appendChild(badge);
  div.appendChild(audio);

  grid.appendChild(div);
});


/* 操作系 */
function startPress(e, index, img) {
  isLongPress = false;

  pressTimer = setTimeout(() => {
    isLongPress = true;
    stopAudio();
  }, 500);
}

function endPress(e, index, img) {
  clearTimeout(pressTimer);

  if (!isLongPress) {
    playSound(index, img);
  }
}

function playSound(index, img) {
  stopAudio();

  const audio = document.getElementById("audio" + index);
  const volume = document.getElementById("volume").value;

  audio.volume = volume;
  audio.play();

  currentAudio = audio;
  currentImg = img;

  document.querySelectorAll("img").forEach(i => i.classList.remove("active"));
  img.classList.add("active");

  audio.onended = () => {
    img.classList.remove("active");

    if (autoPlay) {
      playNext(index);
    }
  };
}

function stopAudio() {
  if (currentAudio) {
    currentAudio.pause();
    currentAudio.currentTime = 0;
  }
  if (currentImg) {
    currentImg.classList.remove("active");
  }
}

function playNext(index) {
  const next = index + 1;
  if (next < items.length) {
    const nextImg = document.querySelectorAll("img")[next];
    playSound(next, nextImg);
  }
}

/* スイッチ */
const toggle = document.getElementById("autoToggle");
const statusText = document.getElementById("statusText");

toggle.addEventListener("change", () => {
  autoPlay = toggle.checked;
  statusText.textContent = autoPlay ? "ON" : "OFF";
});

/* 音量 */
document.getElementById("volume").addEventListener("input", (e) => {
  if (currentAudio) {

<script>

const items = [

  { img:"ソケットレンチ.webp", sound:"ソケットレンチ.wav", name:"ソケット レンチ", category:"工具", sub:"手工具" },
  { img:"両口メガネレンチ.webp", sound:"wrench.mp3", name:"両口 メガネ レンチ", category:"工具", sub:"手工具" },

  { img:"scale.webp", sound:"scale.mp3", name:"スケール", category:"工具", sub:"測定工具" },
  { img:"caliper.webp", sound:"caliper.mp3", name:"ノギス", category:"工具", sub:"測定工具" },

  { img:"impact.webp", sound:"impact.mp3", name:"インパクト", category:"電動工具" },
  { img:"drill.webp", sound:"drill.mp3", name:"ドリル", category:"電動工具" },

  { img:"gloves.webp", sound:"gloves.mp3", name:"手袋", category:"衣類" },
  { img:"raincoat.webp", sound:"raincoat.mp3", name:"雨かっぱ", category:"衣類" },

  { img:"ladder.webp", sound:"ladder.mp3", name:"脚立", category:"設備" },

  { img:"angle.webp", sound:"angle.mp3", name:"アングル", category:"鋼材" },
  { img:"hbeam.webp", sound:"hbeam.mp3", name:"H形鋼", category:"鋼材" }

];

let currentAudio = null;
let currentImg = null;

let currentCategory = "すべて";
let currentSub = "すべて";

const grid = document.getElementById("grid");
const categoriesDiv = document.getElementById("categories");
const subDiv = document.getElementById("subcategories");

/* カテゴリ */
const categories = [...new Set(items.map(i=>i.category))];
categories.unshift("すべて");

categories.forEach(cat=>{
  const btn = document.createElement("button");
  btn.textContent = cat;
  btn.dataset.cat = cat;

  btn.onclick=()=>{
    currentCategory = cat;
    currentSub = "すべて";
    setActive(categoriesDiv, btn);
    renderSub();
    render();
  };

  categoriesDiv.appendChild(btn);
});

categoriesDiv.querySelector("button").classList.add("active");

/* サブカテゴリ */
function renderSub(){

  if(currentCategory !== "工具"){
    subDiv.innerHTML = "";
    return;
  }

  subDiv.innerHTML="";

  let subs = items
    .filter(i=>i.category==="工具")
    .map(i=>i.sub)
    .filter(Boolean);

  subs = [...new Set(subs)];

  subs.forEach(s=>{
    const btn=document.createElement("button");
    btn.textContent=s;

    btn.onclick=()=>{
      currentSub=s;
      setActive(subDiv, btn);
      render();
    };

    subDiv.appendChild(btn);
  });

  if(subDiv.firstChild) subDiv.firstChild.classList.add("active");
}

/* 表示 */
function render(){

  grid.innerHTML="";

  let filtered = items.filter(i=>{
    return (currentCategory==="すべて" || i.category===currentCategory)
      && (currentSub==="すべて" || i.sub===currentSub);
  });

  filtered.forEach(item=>{

    const div=document.createElement("div");
    div.className="item";

    const img=document.createElement("img");
    img.src=item.img;

    const label=document.createElement("div");
    label.className="label";
    label.textContent=item.name;

    const badge=document.createElement("div");
    badge.className="playing-badge";
    badge.textContent="再生中";

    const audio=document.createElement("audio");

    const source=document.createElement("source");
    source.src=item.sound;
    source.type=item.sound.endsWith(".wav")?"audio/wav":"audio/mpeg";

    audio.appendChild(source);

    img.onclick=()=>playSound(audio,img);

    div.append(img,label,badge,audio);
    grid.appendChild(div);
  });
}

/* 再生 */
function playSound(audio,img){
  stopAudio();

  audio.play();
  currentAudio=audio;
  currentImg=img;

  document.querySelectorAll(".item").forEach(i=>i.classList.remove("playing"));
  document.querySelectorAll("img").forEach(i=>i.classList.remove("active"));

  img.classList.add("active");
  img.parentElement.classList.add("playing");

  audio.onended = () => {
    img.classList.remove("active");
    img.parentElement.classList.remove("playing");
  };
}
/* 停止 */
function stopAudio(){
  if(currentAudio){
    currentAudio.pause();
    currentAudio.currentTime=0;
  }
  if(currentImg){
    currentImg.classList.remove("active");
    currentImg.parentElement.classList.remove("playing");
  }
}

/* ボタン切替 */
function setActive(parent,btn){
  parent.querySelectorAll("button").forEach(b=>b.classList.remove("active"));
  btn.classList.add("active");
}

/* 初期 */
renderSub();
render();
